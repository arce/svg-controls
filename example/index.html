<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SVG Controls – Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      color: #f1f5f9;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header span { font-size: 13px; color: #94a3b8; }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #64748b;
      margin-bottom: 10px;
    }

    /* Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 6px; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      color: #334155;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background .15s, border-color .15s;
    }
    button:hover { background: #f1f5f9; border-color: #cbd5e1; }
    button:active { background: #e2e8f0; }
    button.primary { background: #3b82f6; color: #fff; border-color: #2563eb; }
    button.primary:hover { background: #2563eb; }

    /* Toggles */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f1f5f9;
      font-size: 13px;
    }
    .toggle-row:last-child { border-bottom: none; }
    .switch {
      position: relative;
      width: 38px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #cbd5e1;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    input:checked + .slider { background: #3b82f6; }
    input:checked + .slider::before { transform: translateX(16px); }

    /* Color picker */
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    input[type="color"] {
      width: 36px;
      height: 28px;
      padding: 2px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      cursor: pointer;
      background: #fff;
    }

    /* Event log */
    .log {
      background: #0f172a;
      border-radius: 8px;
      padding: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: #94a3b8;
      min-height: 120px;
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
    }
    .log-line { display: flex; gap: 8px; }
    .log-line .time { color: #475569; flex-shrink: 0; }
    .log-zoom { color: #60a5fa; }
    .log-pan  { color: #34d399; }
    .log-sel  { color: #f59e0b; }

    /* ── Main SVG area ── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar button { width: auto; padding: 6px 14px; font-size: 13px; }
    .toolbar .sep { width: 1px; height: 24px; background: #e2e8f0; margin: 0 4px; }

    .svg-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    object {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(15,23,42,.75);
      color: #e2e8f0;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 6px;
      line-height: 1.7;
      pointer-events: none;
    }

    /* Selection info badge */
    #selection-badge {
      display: none;
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: #713f12;
    }
    #selection-badge.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>SVG Controls</h1>
  <span>Interactive zoom · pan · selection demo</span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div>
      <p class="section-title">Zoom</p>
      <div class="btn-group">
        <button id="btn-zoom-in">🔍 Zoom In (×1.3)</button>
        <button id="btn-zoom-out">🔍 Zoom Out (×0.77)</button>
        <button id="btn-reset">↩ Reset View</button>
      </div>
    </div>

    <div>
      <p class="section-title">Pan</p>
      <div class="btn-group">
        <button id="btn-pan-up">↑ Pan Up</button>
        <button id="btn-pan-down">↓ Pan Down</button>
        <button id="btn-pan-left">← Pan Left</button>
        <button id="btn-pan-right">→ Pan Right</button>
      </div>
    </div>

    <div>
      <p class="section-title">Select Node</p>
      <div class="btn-group">
        <button class="select-btn" data-id="internet">🌐 Internet</button>
        <button class="select-btn" data-id="load-balancer">⚖️ Load Balancer</button>
        <button class="select-btn" data-id="server-a">🖥 Server A</button>
        <button class="select-btn" data-id="server-b">🖥 Server B</button>
        <button class="select-btn" data-id="server-c">🖥 Server C</button>
        <button class="select-btn" data-id="database">🗄 PostgreSQL</button>
        <button class="select-btn" data-id="cache">⚡ Redis Cache</button>
        <button class="select-btn" data-id="storage">☁️ Object Storage</button>
        <button class="select-btn" data-id="">✖ Clear Selection</button>
      </div>
      <div id="selection-badge" style="margin-top:10px">
        Selected: <strong id="selection-label">—</strong>
      </div>
    </div>

    <div>
      <p class="section-title">Features</p>
      <div>
        <div class="toggle-row">
          <span>Zoom</span>
          <label class="switch">
            <input type="checkbox" id="toggle-zoom" checked/>
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span>Pan</span>
          <label class="switch">
            <input type="checkbox" id="toggle-pan" checked/>
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span>Selection</span>
          <label class="switch">
            <input type="checkbox" id="toggle-select" checked/>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div>
      <p class="section-title">Selection Color</p>
      <div class="color-row">
        <input type="color" id="color-picker" value="#ef4444"/>
        <span id="color-label">#ef4444</span>
      </div>
    </div>

    <div>
      <p class="section-title">Event Log</p>
      <div class="log" id="log"></div>
    </div>

  </aside>

  <!-- ── Main area ── -->
  <main class="main">
    <div class="toolbar">
      <button id="tb-zoom-in" class="primary">＋ Zoom</button>
      <button id="tb-zoom-out">－ Zoom</button>
      <div class="sep"></div>
      <button id="tb-reset">↩ Reset</button>
    </div>

    <div class="svg-wrapper">
      <object id="svg-obj" type="image/svg+xml" data="diagram.svg"></object>
      <div class="hint">
        Scroll to zoom &nbsp;·&nbsp; Drag to pan &nbsp;·&nbsp; Click to select &nbsp;·&nbsp; Double-click to reset
      </div>
    </div>
  </main>

</div>

<!-- Include the library -->
<script src="../svg-controls.js"></script>

<script>
  const obj = document.getElementById('svg-obj');

  // Wait for the library to attach
  const waitForAPI = (cb) => {
    const poll = setInterval(() => {
      if (obj.__SVGControl) { clearInterval(poll); cb(obj.__SVGControl); }
    }, 50);
  };

  waitForAPI((api) => {

    // ── Callbacks ──
    const log = document.getElementById('log');
    const addLog = (cls, msg) => {
      const t = new Date().toLocaleTimeString('en', { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="time">${t}</span><span class="${cls}">${msg}</span>`;
      log.prepend(line);
      if (log.children.length > 60) log.lastChild.remove();
    };

    api.setCallback('zoom', (factor) =>
      addLog('log-zoom', `zoom  factor=${factor.toFixed(3)}`));

    api.setCallback('pan', (dx, dy) =>
      addLog('log-pan', `pan   dx=${dx} dy=${dy}`));

    api.setCallback('select', (id) => {
      const badge = document.getElementById('selection-badge');
      const label = document.getElementById('selection-label');
      if (id) {
        addLog('log-sel', `select  id="${id}"`);
        label.textContent = id;
        badge.classList.add('visible');
      } else {
        addLog('log-sel', 'select  cleared');
        badge.classList.remove('visible');
      }
    });

    // ── Zoom buttons ──
    document.getElementById('btn-zoom-in').onclick  = () => api.zoom(1.3);
    document.getElementById('btn-zoom-out').onclick = () => api.zoom(0.77);
    document.getElementById('btn-reset').onclick    = () => api.reset();
    document.getElementById('tb-zoom-in').onclick   = () => api.zoom(1.3);
    document.getElementById('tb-zoom-out').onclick  = () => api.zoom(0.77);
    document.getElementById('tb-reset').onclick     = () => api.reset();

    // ── Pan buttons ──
    document.getElementById('btn-pan-up').onclick    = () => api.pan(0,  60);
    document.getElementById('btn-pan-down').onclick  = () => api.pan(0, -60);
    document.getElementById('btn-pan-left').onclick  = () => api.pan( 60, 0);
    document.getElementById('btn-pan-right').onclick = () => api.pan(-60, 0);

    // ── Select buttons ──
    document.querySelectorAll('.select-btn').forEach(btn => {
      btn.onclick = () => api.select(btn.dataset.id || null);
    });

    // ── Feature toggles ──
    document.getElementById('toggle-zoom').onchange   = (e) => api.toggleFeature('zoom',   e.target.checked);
    document.getElementById('toggle-pan').onchange    = (e) => api.toggleFeature('pan',    e.target.checked);
    document.getElementById('toggle-select').onchange = (e) => api.toggleFeature('select', e.target.checked);

    // ── Color picker ──
    const picker = document.getElementById('color-picker');
    const colorLabel = document.getElementById('color-label');
    picker.oninput = () => {
      colorLabel.textContent = picker.value;
      api.setSelectionColor(picker.value);
    };

    addLog('log-sel', 'SVG Controls ready');
  });
</script>

</body>
</html>
